# AI Colmap Camera Tracking - Batch Configuration Template
# 
# 優先順序: [資料夾名稱] > [global] > 命令行參數 > 程式預設值

[global]
# --- 追蹤設定 ---
# 影像縮放比例 (0.1 ~ 1.0)
scale = 0.5
# 特徵匹配重疊幀數 (預設 12)
overlap = 12
# 定位演算法 (glomap 或 colmap)
mapper = glomap

# --- 相機設定 ---
# COLMAP 相機模型 (例如: OPENCV, PINHOLE, SIMPLE_RADIAL)
# 如果不確定，請註解掉讓程式自動判斷
# camera_model = OPENCV

# --- 色彩與遮罩 ---
# 是否為 ACEScg 色彩空間 (true/false)
acescg = false
# LUT 檔案路徑 (.cube)
# lut = C:/path/to/your/lut.cube
# 遮罩目錄路徑
# mask = C:/path/to/masks

# --- 後處理 ---
# 是否跳過 Houdini 場景建構 (true/false)
skip_houdini = false
# Houdini 安裝路徑 (HFS)
# hfs = C:/Program Files/Side Effects Software/Houdini 20.0.653

# --- 處理多相機 ---
# 如果一個資料夾內有多個影片檔且相機不同，設為 true
multi_cams = false


# [example_folder_name]
# # 這裡可以針對特定資料夾覆蓋 global 的設定
# scale = 1.0
# overlap = 24
# mapper = colmap
# skip_houdini = true
