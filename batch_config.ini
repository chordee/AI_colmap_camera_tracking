# AI Colmap Camera Tracking - Batch Configuration Template
# 
# Priority: [Folder Name] > [global] > CLI Arguments > Program Defaults

[global]
# --- Tracking Settings ---
# Image scale factor (0.1 ~ 1.0)
scale = 0.5
# Sequential matching overlap frames (Default: 12)
overlap = 12

# --- Camera Settings ---
# COLMAP camera model (e.g., OPENCV, PINHOLE, SIMPLE_RADIAL)
# If unsure, comment it out to let the program decide automatically
# camera_model = OPENCV

# Focal length in mm (real lens focal length, e.g. 24 for a 24mm lens).
# Combined with sensor_width_mm to auto-calculate COLMAP camera_params.
# Leave commented out to let COLMAP estimate focal length automatically.
# Example: 24mm lens on Sony FX3 (Full Frame, ~35.6mm sensor width)
#   focal_length_mm = 24
#   sensor_width_mm = 35.6
# Common sensor widths (mm): Full Frame=36.0, ARRI LF=36.7, Super35=24.89, MFT=17.3
# focal_length_mm = 24
# sensor_width_mm = 36.0

# --- Color & Masking ---
# Whether input is in ACEScg color space (true/false)
acescg = false
# Path to LUT file (.cube)
# lut = C:/path/to/your/lut.cube
# Path to mask directory
# mask = C:/path/to/masks

# --- Post-Processing ---
# Whether to skip Houdini scene generation (true/false)
skip_houdini = false
# Houdini installation path (HFS)
# hfs = C:/Program Files/Side Effects Software/Houdini 20.0.653

# --- Multi-Camera Handling ---
# Set to true if a folder contains multiple videos with different camera settings
multi_cams = false

# --- Loop Detection (COLMAP Sequential Matching) ---
# Enable loop detection (true/false)
loop = false
# Loop detection period (Default: 5)
loop_period = 5
# Number of images to check for loop detection (Default: 50)
loop_num_images = 50
# Path to vocabulary tree for loop detection
vocab_tree_path = vocab_tree_faiss_flickr100K_words32K.bin

# --- Advanced Parameter Injection (Optional) ---
# Use prefixes to pass any COLMAP parameter:
# fe. (feature_extractor), sm. (sequential_matcher), ma. (mapper)
# fe.SiftExtraction.peak_threshold = 0.0066
# sm.SequentialMatching.min_num_matches = 15


# [example_folder_name]
# # Overwrite global settings for a specific folder here
# scale = 1.0
# overlap = 24
# skip_houdini = true
